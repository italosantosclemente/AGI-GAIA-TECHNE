<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI-GAIA-TECHNE Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Framework Integrado</p>
                <h1>AGI-GAIA-TECHNE</h1>
            </div>
            <div id="status-pill" class="status-pill">Carregando</div>
        </header>

        <section class="control-panel" aria-label="Controles de simulação">
            <label class="slider-field" for="synergy-slider">
                <span>Álef</span>
                <input type="range" id="synergy-slider" min="0" max="2" step="0.1" value="1">
                <output id="synergy-value" for="synergy-slider">1.0</output>
            </label>
            <button id="run-button" type="button">Simular</button>
            <button id="veto-button" type="button" class="danger">Veto Ethos</button>
        </section>

        <section class="metrics-grid" aria-label="Métricas do framework">
            <article class="metric">
                <span>Techné Score</span>
                <strong id="techne-value">0.0000</strong>
            </article>
            <article class="metric">
                <span>IAE</span>
                <strong id="iae-value">0.0000</strong>
            </article>
            <article class="metric">
                <span>Harmonia</span>
                <strong id="harmony-value">0.0000</strong>
            </article>
            <article class="metric">
                <span>Ethos</span>
                <strong id="ethos-value">0.0000</strong>
            </article>
        </section>

        <section class="workspace">
            <div class="panel conjecture-panel">
                <h2>Conjectura</h2>
                <textarea id="conjecture-input" spellcheck="true" placeholder="Digite uma conjectura para avaliação Ethos"></textarea>
                <button id="submit-button" type="button">Enviar</button>
                <pre id="narrative-output">Aguardando narrativa...</pre>
            </div>

            <div class="panel synthesis-panel">
                <h2>Síntese</h2>
                <p id="summary-output">Carregando síntese do framework...</p>
                <div id="flags-output" class="flags"></div>
            </div>
        </section>

        <section class="chart-row" aria-label="Gráficos">
            <div class="panel chart-panel">
                <h2>Harmonia</h2>
                <canvas id="harmonyChart"></canvas>
            </div>
            <div class="panel chart-panel">
                <h2>Métricas</h2>
                <canvas id="metricsChart"></canvas>
            </div>
        </section>

        <section class="panel documents-panel">
            <div class="section-heading">
                <h2>Documentos Principais</h2>
                <span id="document-count">0 arquivos</span>
            </div>
            <div id="principal-documents" class="document-list"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
